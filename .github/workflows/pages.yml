name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'shared/**'
      - '.github/workflows/pages.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-ai-learn
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          # 自定义域 ai.yuchuntest.com 从根路径提供，勿用 /ai_learn_node/
          VITE_BASE: /
          VITE_ROUTER_BASE: /
          # HTTPS API（百度云 /ai/api/ 或 CFC 代理）；未配置时构建仍成功，但数据请求会失败
          VITE_API_BASE: ${{ secrets.VITE_AI_API_BASE }}
        run: npm run build --workspace=frontend

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
